<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — Bloom Haven</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <div class="header__logo">Bloom Haven</div>
            <nav class="header__nav">
                <ul class="header__list">
                    <li><a href="index.html" class="header__link">Главная</a></li>
                    <li><a href="catalog.html" class="header__link header__link--active">Каталог</a></li>
                    <li><a href="about.html" class="header__link">О нас</a></li>
                </ul>
            </nav>
            <div class="header__actions">
                <button class="header__cart" id="cart-btn">🛒 <span id="cart-count" class="header__cart-count">0</span></button>
            </div>
        </div>
    </header>

    <section class="catalog">
        <div class="catalog__container">
            <h1 class="catalog__title">Наш каталог</h1>
            
            <div class="products-grid" id="catalog-products"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer__container">
            <div class="footer__info">
                <div class="footer__logo">Bloom Haven</div>
                <p>© 2026 Все права защищены</p>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
